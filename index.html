<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Grandchild's Moments</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header Section -->
    <header class="album-header">
      <h1>Growing Up Beautiful</h1>
      <p>A collection of our favorite moments with our wonderful grandchild.</p>
      <div class="header-divider"></div>
    </header>

    <!-- Photo Collage Grid Container -->
    <main class="collage-container">
      <!-- Photo Item 1 (Large Featured Vertical) -->
      <div class="collage-item large-vertical">
        <img src="photo1.png" alt="Grandchild moment 1" loading="lazy" />
        <div class="photo-caption">First Steps</div>
      </div>

      <!-- Photo Item 2 (Standard Square) -->
      <div class="collage-item">
        <img src="photo2.jpg" alt="Grandchild moment 2" loading="lazy" />
        <div class="photo-caption">Sunny Days at the Park</div>
      </div>

      <!-- Photo Item 3 (Horizontal Wide) -->
      <div class="collage-item wide-horizontal">
        <img src="photo3.png" alt="Grandchild moment 3" loading="lazy" />
        <div class="photo-caption">Holiday Family Dinner</div>
      </div>

      <!-- Photo Item 4 (Standard Square) -->
      <div class="collage-item">
        <img src="photo4.png" alt="Grandchild moment 4" loading="lazy" />
        <div class="photo-caption">Smiles with Grandma</div>
      </div>

      <!-- Photo Item 5 (Standard Square) -->
      <div class="collage-item">
        <img src="photo5.png" alt="Grandchild moment 5" loading="lazy" />
        <div class="photo-caption">Birthday Cake Joy</div>
      </div>

      <!-- Photo Item 6 (Large Featured Vertical) -->
      <div class="collage-item large-vertical">
        <img src="photo6.png" alt="Grandchild moment 6" loading="lazy" />
        <div class="photo-caption">First Day of Kindergarten</div>
      </div>

      <!-- Photo Item 7 (Standard Square) -->
      <div class="collage-item">
        <img src="photo7.png" alt="Grandchild moment 7" loading="lazy" />
        <div class="photo-caption">Beach Trip Adventures</div>
      </div>
    </main>

    <!-- Footer Section -->
    <footer class="album-footer">
      <p>Made with ❤️ by Grandma & Grandpa</p>
      <p class="private-tag">🔒 Private Family Archive</p>
    </footer>
  </body>
</html>
